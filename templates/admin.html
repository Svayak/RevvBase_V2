{% extends "base.html" %}
{% block title %}Admin – Revvbase{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Användare</h1>
</div>

<div class="form-card" style="max-width:560px; margin-bottom:2rem;">
  <h3 class="form-section__title" style="margin-bottom:1rem;">Lägg till användare</h3>
  <form method="post" action="{{ url_for('ny_anvandare') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Namn</label>
        <input class="form-input" type="text" name="namn" placeholder="Anna Karlsson" required>
      </div>
      <div class="form-group">
        <label class="form-label">Användarnamn</label>
        <input class="form-input" type="text" name="username" placeholder="anna" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Lösenord</label>
        <input class="form-input" type="password" name="password" required>
      </div>
      <div class="form-group">
        <label class="form-label">Roll</label>
        <select class="form-input" name="roll">
          <option value="anställd">Anställd</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Lägg till</button>
  </form>
</div>

<div style="max-width:560px;">
  <h3 class="section-title">Befintliga användare</h3>
  <div style="display:flex; flex-direction:column; gap:0.5rem; margin-top:0.75rem;">
    {% for a in anvandare %}
    <div style="display:flex; align-items:center; gap:1rem; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:0.75rem 1rem; flex-wrap:wrap;">
      <div style="flex:1;">
        <div style="font-weight:600;">{{ a.namn }}</div>
        <div style="font-size:0.8rem; color:var(--text-muted);">@{{ a.username }} · {{ a.roll }}</div>
      </div>
      <form method="post" action="{{ url_for('byt_losenord', anv_id=a.id) }}" style="display:flex; gap:0.5rem; align-items:center;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input class="form-input" type="password" name="password" placeholder="Nytt lösenord" style="width:150px; padding:0.35rem 0.6rem; font-size:0.82rem;">
        <button type="submit" class="btn btn-ghost btn-sm">Byt</button>
      </form>
      {% if a.id != current_user.id %}
      <form method="post" action="{{ url_for('ta_bort_anvandare', anv_id=a.id) }}"
            onsubmit="return confirm('Ta bort {{ a.namn }}?')">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" class="btn btn-danger btn-sm">Ta bort</button>
      </form>
      {% endif %}
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
