<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logga in – Revvbase</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 100%; max-width: 380px; padding: 1.5rem; }
    .login-logo { text-align: center; margin-bottom: 2rem; }
    .login-logo span { font-family: var(--font-head); font-size: 2rem; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo"><span>⚙ REVVBASE</span></div>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <form method="post" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label">Användarnamn</label>
      <input class="form-input" type="text" name="username" autofocus autocomplete="username" required {% if blockerad %}disabled{% endif %}>
    </div>
    <div class="form-group">
      <label class="form-label">Lösenord</label>
      <input class="form-input" type="password" name="password" autocomplete="current-password" required {% if blockerad %}disabled{% endif %}>
    </div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;" {% if blockerad %}disabled{% endif %}>
      {% if blockerad %}Låst{% else %}Logga in{% endif %}
    </button>
  </form>
</div>
</body>
</html>
