<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontot pausat – Revvbase</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .pausad-wrap { width: 100%; max-width: 480px; padding: 2rem; text-align: center; }
    .pausad-icon { font-size: 3rem; margin-bottom: 1rem; }
    .pausad-title { font-family: var(--font-head); font-size: 2rem; font-weight: 700; color: var(--text); margin-bottom: 0.75rem; }
    .pausad-text { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
    .pausad-actions { display: flex; flex-direction: column; gap: 0.75rem; align-items: center; }
  </style>
</head>
<body>
<div class="pausad-wrap">
  <div class="pausad-icon">🔒</div>
  <div class="pausad-title">Kontot är pausat</div>
  <div class="pausad-text">
    Ditt konto har pausats. Du kan inte använda systemet just nu.<br><br>
    Kontakta <a href="mailto:kontakt@revvbase.se" style="color:var(--accent)">kontakt@revvbase.se</a> för att återaktivera ditt konto.
  </div>
  <div class="pausad-actions">
    <a href="{{ url_for('exportera_data') }}" class="btn btn-primary" style="width:100%; justify-content:center;">
      ⬇ Ladda ner din data (CSV)
    </a>
    <a href="{{ url_for('logout') }}" class="btn btn-ghost" style="width:100%; justify-content:center;">
      Logga ut
    </a>
  </div>
</div>
</body>
</html>
